<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch A Sketch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Etch-a-Sketch</h1>
    <button id="reset" style="margin-bottom: 10px;" onclick="generateGrid(16)">Reset Grid</button>
    
    <div class="grid-container">
        
    </div>
    
    <form style="margin: 10px 0;">
        <label for="input-gridSize">Enter grid size(max: 100)</label>
        <input type="number" max="100" id="input-gridSize">
        <button id="input-btn">Apply</button>
    </form>

    <script src="script.js"></script>
</body>
</html>
